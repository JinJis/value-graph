# Run the datasets API with: docker compose up --build
# Reads upstream keys from datasets/.env (gitignored). Copy .env.example first.
services:
  datasets-api:
    build: .
    image: valuegraph-datasets:latest
    container_name: valuegraph-datasets
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
