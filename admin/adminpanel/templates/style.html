<style>
:root{
  --bg:#0b0e14;--panel:#121722;--panel-2:#0e1320;--line:#222b3a;--line-2:#2c374a;
  --text:#e7ecf3;--muted:#93a0b4;--faint:#6b7689;--accent:#4f8cff;--accent-2:#2563eb;
  --ok:#2fae6a;--ok-bg:#11271b;--warn:#d9a300;--warn-bg:#2c2410;--err:#ff6b6b;--err-bg:#2a1416;
  --run:#e0c060;--mono:"SF Mono","JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0;font-size:14px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.mono,code{font-family:var(--mono);font-size:12px}
.muted{color:var(--muted)}.faint{color:var(--faint)}
/* layout */
.app{display:grid;grid-template-columns:228px 1fr;min-height:100vh}
.side{background:var(--panel-2);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
.brand{display:flex;align-items:center;gap:9px;padding:6px 10px 16px;font-weight:700;letter-spacing:.5px}
.brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.nav{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--muted);font-weight:500}
.nav:hover{background:var(--panel);color:var(--text);text-decoration:none}
.nav.on{background:var(--panel);color:var(--text)}
.nav .i{width:18px;text-align:center;opacity:.85}
.side .sp{flex:1}
.side .foot{border-top:1px solid var(--line);padding-top:10px;font-size:12px;color:var(--faint)}
.content{min-width:0}
.bar{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,14,20,.86);backdrop-filter:blur(8px);z-index:5}
.bar h1{font-size:17px;margin:0}
.barright{display:flex;align-items:center;gap:12px}
.refreshctl{display:flex;align-items:center;gap:6px}
.rbtn{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;
  width:32px;height:32px;cursor:pointer;font-size:15px;line-height:1}
.rbtn:hover{border-color:var(--accent)}
.rsel{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;
  padding:6px 8px;font-size:12px;font-family:inherit;cursor:pointer}
.page{padding:22px 26px;max-width:1280px}
/* a control styled as a plain button-link (job 로그 link sits next to ops form buttons) */
.linkbtn{display:inline-block;text-decoration:none;color:var(--text);background:var(--panel-2);
  border:1px solid var(--line-2);border-radius:9px;padding:6px 10px;font-size:12px}
.linkbtn:hover{border-color:var(--accent)}
/* a monospace log/error box — the captured failure reason (e.g. RAG ReadTimeout) */
.logbox{font-family:var(--mono);font-size:12px;line-height:1.55;white-space:pre-wrap;word-break:break-word;
  background:var(--panel-2);border:1px solid var(--line-2);border-radius:9px;padding:12px 14px;margin:8px 0;color:var(--text)}
.logbox.err{border-color:#5c2326;background:var(--err-bg);color:#ffcaca}
/* live pipeline activity feed — granular "what's it doing now" lines (newest first) */
.actfeed{font-family:var(--mono);font-size:11.5px;line-height:1.5;background:var(--panel-2);
  border:1px solid var(--line-2);border-radius:9px;padding:6px 10px;max-height:360px;overflow:auto;margin:8px 0}
.actline{display:flex;gap:9px;padding:2px 0;border-bottom:1px solid var(--line-3)}
.actline:last-child{border-bottom:none}
.actline .at{color:var(--faint);flex:none}
.actline .mk{color:var(--muted);flex:none;width:20px}
.actline .msg{color:var(--text);word-break:break-word}
.actline.warn .msg{color:#e8c97a}
.actline.err .msg{color:#ff9a9a}
/* sections */
h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:26px 0 12px;font-weight:600}
h2:first-child{margin-top:0}
h3{font-size:14px;margin:0 0 8px}
/* tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.tile .k{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
.tile .v{font-size:24px;font-weight:700;margin-top:6px}
.tile .v.sm{font-size:15px;font-weight:600}
/* cards / grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px}
.card h3{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card .sub{color:var(--muted);font-size:12px;margin:2px 0 10px}
/* tables */
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;white-space:nowrap}
th{background:var(--panel-2);color:var(--muted);font-weight:600;font-size:12px;position:sticky;top:0}
tbody tr:last-child td{border-bottom:0}
tbody tr.rowlink{cursor:pointer}
tbody tr.rowlink:hover td{background:var(--panel-2)}
td.wrap,.kvv{white-space:pre-wrap;word-break:break-word}
/* badges + status */
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line-2);color:var(--muted);background:var(--panel-2)}
.badge.ok{color:#7fe6ad;background:var(--ok-bg);border-color:#1d4d33}
.badge.warn{color:#e8c97a;background:var(--warn-bg);border-color:#5c4a18}
.badge.err{color:#ff9a9a;background:var(--err-bg);border-color:#5c2326}
.badge.run{color:#efd98a;background:var(--warn-bg);border-color:#5c4a18}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--faint)}
.sdot.ok{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.sdot.err{background:var(--err)}.sdot.run{background:var(--run);box-shadow:0 0 7px var(--run)}
.cnt{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:0 6px;margin-left:4px;font-size:11px;color:var(--muted)}
.pill{display:inline-block;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:3px 8px;font-size:12px;margin:0 4px 4px 0}
.pill a,.pill code{color:var(--text)}
/* progress */
.prog{height:7px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;overflow:hidden;min-width:120px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent))}
.prog.run>i{background:linear-gradient(90deg,#b48a16,var(--run))}
.prog.ok>i{background:linear-gradient(90deg,#1d6e44,var(--ok))}
.prog.err>i{background:var(--err)}
/* forms / buttons */
input,select,textarea,button{background:var(--panel-2);border:1px solid var(--line-2);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
label.fld{display:block;margin-bottom:12px}
label.fld .nm{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
label.fld .nm code{color:var(--faint)}
label.fld input,label.fld textarea,label.fld select{width:100%}
button,.btn{cursor:pointer;font-weight:600}
button.p,.btn.p{background:var(--accent);border-color:var(--accent);color:#fff}
button.danger{background:var(--err-bg);border-color:#5c2326;color:#ff9a9a}
form.ops{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 10px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
/* PH-PIPE pipeline visualization + unified backfill */
.flow{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin:8px 0}
.flow .arrow{color:var(--muted);font-weight:700;margin:0 2px}
.opsrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.opsrow form.ops{margin:0}
form.ops2{display:flex;flex-direction:column;gap:10px}
form.ops2 .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
form.ops2 .row>label:first-child{min-width:78px;color:var(--muted);font-size:12px}
form.ops2 input,form.ops2 select{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:6px 8px}
form.ops2 .checks{display:flex;gap:12px;flex-wrap:wrap}
form.ops2 .chk{display:flex;align-items:center;gap:5px;color:var(--text);font-size:13px}
form.ops2 button.p{align-self:flex-start}
/* misc */
.crumb{font-size:12px;color:var(--muted);margin-bottom:12px}
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.flash{background:#10243a;border:1px solid #234b73;color:#bcd9ff;padding:9px 13px;border-radius:9px;margin-bottom:16px}
.warn{background:var(--warn-bg);border:1px solid #5c4a18;color:#e8c97a;padding:11px 13px;border-radius:9px;margin:6px 0}
.err{color:var(--err)}.ok{color:#7fe6ad}
.errlog summary{cursor:pointer;color:var(--err);font-size:11px}
.errlog pre{white-space:pre-wrap;word-break:break-word;max-height:260px;overflow:auto;margin:6px 0 0;
  padding:8px 10px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;font-size:11px;color:#ffb3ad}
.pg{display:inline-block;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 11px;margin-right:10px}
.pgbar{display:flex;align-items:center;gap:12px;margin:0 0 12px}
.empty{color:var(--muted);padding:20px;text-align:center;border:1px dashed var(--line-2);border-radius:12px}
.hint{color:var(--muted);font-size:12px;line-height:1.6;margin:6px 0}
.kvk{width:230px;color:var(--muted);font-weight:500;white-space:nowrap}
</style>
