<!doctype html><html><head><meta charset=utf-8><title>VG Admin · login</title>
<style>
body{background:#0b0e14;color:#e7ecf3;font-family:system-ui,-apple-system,sans-serif;display:flex;height:100vh;align-items:center;justify-content:center;margin:0}
.c{background:#121722;border:1px solid #222b3a;border-radius:16px;padding:34px;width:330px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.brand .dot{width:10px;height:10px;border-radius:3px;background:#4f8cff;box-shadow:0 0 10px #4f8cff}
.sub{color:#93a0b4;font-size:12px;margin:0 0 18px}
input{width:100%;box-sizing:border-box;background:#0e1320;border:1px solid #2c374a;color:#e7ecf3;padding:11px;border-radius:10px;margin-bottom:10px;font-size:14px}
input:focus{outline:none;border-color:#4f8cff}
button{width:100%;background:#4f8cff;color:#fff;border:0;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px}
.e{color:#ff6b6b;font-size:13px;margin-bottom:8px}
</style></head><body>
<div class=c>
<div class=brand><span class=dot></span>VALUE·GRAPH</div>
<p class=sub>Operations console</p>
{err}
<form method=post action=/login>
<input name=username placeholder=username autofocus>
<input name=password type=password placeholder=password>
<button>Sign in</button></form></div>
</body></html>
