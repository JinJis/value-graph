[project]
name = "valuegraph-graph-schema"
version = "0.0.0"
description = "ValueGraph knowledge-graph schema — Python types + validation (PRD §5)."
requires-python = ">=3.11"
dependencies = ["jsonschema>=4.18"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["graph_schema"]

# Bundle the canonical schema (the SSOT lives one level up, shared with the TS
# package) into the wheel so installed consumers can load it via importlib.resources.
[tool.hatch.build.targets.wheel.force-include]
"../schema/valuegraph.schema.json" = "graph_schema/valuegraph.schema.json"
