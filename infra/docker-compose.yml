# ValueGraph local stack — datastores (Neo4j / Postgres / Redis) + services
# (engine / studio / terminal).
#   Full stack:     docker compose -f infra/docker-compose.yml up -d --build
#   Databases only: docker compose -f infra/docker-compose.yml up -d postgres neo4j redis
#   DB smoke-test:  infra/smoke_test.sh
#
# Credentials use ${VAR:-default} so the stack runs without a .env file in local dev.
# Set GOOGLE_API_KEY in your environment (or .env) for the engine's Gemini calls.
name: valuegraph

services:
  neo4j:
    image: neo4j:5.24
    container_name: valuegraph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-valuegraph}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474" # HTTP browser
      - "${NEO4J_BOLT_PORT:-7687}:7687" # Bolt driver
    volumes:
      - neo4j_data:/data
    healthcheck:
      # Prove Bolt + auth actually work, not just that the port is open.
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD:-valuegraph}\" 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: valuegraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-valuegraph}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-valuegraph}"
      POSTGRES_DB: "${POSTGRES_DB:-valuegraph}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-valuegraph}\" -d \"${POSTGRES_DB:-valuegraph}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: valuegraph-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  engine:
    build:
      context: ..
      dockerfile: services/engine/Dockerfile
    container_name: valuegraph-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-valuegraph}:${POSTGRES_PASSWORD:-valuegraph}@postgres:5432/${POSTGRES_DB:-valuegraph}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-valuegraph}"
      REDIS_URL: "redis://redis:6379/0"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    ports:
      - "${ENGINE_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  studio:
    build:
      context: ..
      dockerfile: apps/studio/Dockerfile
    container_name: valuegraph-studio
    restart: unless-stopped
    environment:
      # Next.js rewrites /engine/* -> the engine over the compose network (no port exposed
      # to the browser; works behind any tunnel/proxy).
      ENGINE_INTERNAL_URL: "http://engine:8000"
    ports:
      - "${STUDIO_PORT:-3001}:3001"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  terminal:
    build:
      context: ..
      dockerfile: apps/terminal/Dockerfile
    container_name: valuegraph-terminal
    restart: unless-stopped
    environment:
      ENGINE_INTERNAL_URL: "http://engine:8000"
    ports:
      - "${TERMINAL_PORT:-3000}:3000"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  neo4j_data:
  pg_data:
  redis_data:
