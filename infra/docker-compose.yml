# ValueGraph local infrastructure — Neo4j (graph), Postgres (RDBMS), Redis (cache/queue).
# [M0-INFRA-02] Bring up:  docker compose -f infra/docker-compose.yml up -d
# Smoke-test:              infra/smoke_test.sh
#
# Credentials use ${VAR:-default} so the stack runs without a .env file in local dev.
# App-facing connection URLs (.env / DATABASE_URL / NEO4J_URI …) are wired in later
# M0 tasks (M0-LLM-04 / M0-DB-06); this file only stands the databases up.
name: valuegraph

services:
  neo4j:
    image: neo4j:5.24
    container_name: valuegraph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-valuegraph}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474" # HTTP browser
      - "${NEO4J_BOLT_PORT:-7687}:7687" # Bolt driver
    volumes:
      - neo4j_data:/data
    healthcheck:
      # Prove Bolt + auth actually work, not just that the port is open.
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD:-valuegraph}\" 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: valuegraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-valuegraph}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-valuegraph}"
      POSTGRES_DB: "${POSTGRES_DB:-valuegraph}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-valuegraph}\" -d \"${POSTGRES_DB:-valuegraph}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: valuegraph-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  neo4j_data:
  pg_data:
  redis_data:
